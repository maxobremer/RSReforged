name: Release

# Triggered by pushing a tag of the form `release-X.Y.Z`. The tagged commit's
# module.json must already declare the matching version — the workflow refuses
# to publish if they disagree, which catches the very common mistake of
# tagging a release without bumping module.json first.
#
# What it produces, attached to a GitHub Release:
#   - rsreforged-release-<version>.zip   (the module distribution)
#   - module.json                         (alternate install path for Forge etc.)
#
# If the repo has a FOUNDRY_RELEASE_TOKEN secret configured, the workflow also
# POSTs the new version to Foundry's Package Release API so it appears in
# Foundry's in-app module browser. The step is skipped (with a notice) when
# the secret is absent, so this workflow still works on forks and before the
# initial package submission is approved.
#
# Security note: all step `run:` blocks read template-substituted values via
# env: passthroughs rather than splicing `${{ ... }}` expressions directly
# into shell, so a tag whose name contained shell metacharacters cannot
# inject commands. (See: https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/)

on:
  push:
    tags:
      - 'release-*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out tag
        uses: actions/checkout@v6

      - name: Derive version from tag
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          tag="$REF_NAME"
          version="${tag#release-}"
          if [ -z "$version" ] || [ "$version" = "$tag" ]; then
            echo "Tag '$tag' does not match expected pattern release-X.Y.Z" >&2
            exit 1
          fi
          # Reject tag names that contain anything other than digits, dots, or
          # hyphens, so a hostile tag like 'release-1.0;rm' can't sneak through.
          if ! printf '%s' "$version" | grep -Eq '^[0-9A-Za-z.+-]+$'; then
            echo "Refusing version '$version': contains unexpected characters" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Derived version: $version"

      - name: Verify module.json version matches tag
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          manifest_version=$(jq -r .version module.json)
          if [ "$manifest_version" != "$TAG_VERSION" ]; then
            echo "module.json says version=$manifest_version but tag says version=$TAG_VERSION" >&2
            echo "Bump module.json before tagging." >&2
            exit 1
          fi
          echo "module.json version matches tag: $manifest_version"

      # Foundry reads `version` to decide whether an update is available, but
      # fetches the zip at `download`. If those disagree, the package browser
      # silently installs the older zip — and since the older zip's bundled
      # module.json also calls itself by its old version, update checks loop
      # forever reporting "X.Y.Z -> X.Y.Z". Caught the hard way in 4.4.0.
      #
      # Both env values are safe to splice into shell: TAG_VERSION was filtered
      # by the regex check in the "Derive version from tag" step, and
      # github.repository is GitHub-controlled (owner/name, no metacharacters).
      - name: Verify module.json download URL matches tag
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          download_url=$(jq -r .download module.json)
          expected="https://github.com/${REPOSITORY}/releases/download/release-${TAG_VERSION}/rsreforged-release-${TAG_VERSION}.zip"
          if [ "$download_url" != "$expected" ]; then
            echo "module.json download URL is $download_url" >&2
            echo "expected                   $expected" >&2
            echo "Bump the download URL in module.json before tagging." >&2
            exit 1
          fi
          echo "Download URL matches tag: $download_url"

      - name: Build distribution zip
        env:
          TAG_VERSION: ${{ steps.version.outputs.version }}
        run: |
          zip_name="rsreforged-release-${TAG_VERSION}.zip"

          # What ships in the zip: only what Foundry needs at runtime, plus
          # LICENSE (legally required to ship with the redistribution) and
          # README (so the in-Foundry "View Module" pane has something useful).
          # Excludes docs/ (upstream snapshot, dev-only), CHANGELOG, dotfiles,
          # and the .github/ directory.
          zip -r "$zip_name" \
            module.json \
            LICENSE \
            README.md \
            src \
            css \
            lang \
            templates

          ls -la "$zip_name"
          echo "ZIP_NAME=$zip_name" >> "$GITHUB_ENV"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: RSReforged ${{ steps.version.outputs.version }}
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for the full release notes.

            **Install / update via manifest URL:**
            ```
            https://raw.githubusercontent.com/${{ github.repository }}/master/module.json
            ```
          draft: false
          prerelease: false
          files: |
            ${{ env.ZIP_NAME }}
            module.json
          fail_on_unmatched_files: true

      # Detect whether a Foundry Package Release Token is configured. If not,
      # skip the publish step with a notice — this is the normal state for
      # forks, PR builds, and for this repo before the initial package
      # submission at foundryvtt.com/packages/submit is approved.
      - name: Detect Foundry release token
        id: foundry
        env:
          FOUNDRY_RELEASE_TOKEN: ${{ secrets.FOUNDRY_RELEASE_TOKEN }}
        run: |
          if [ -n "$FOUNDRY_RELEASE_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::notice::FOUNDRY_RELEASE_TOKEN not set; skipping Foundry package browser publish."
          fi

      # Publishes the new version to Foundry's Package Release API so it
      # appears in the in-app module browser. Docs: https://foundryvtt.com/article/package-release-api/
      #
      # Notes on the payload:
      #   - `release.manifest` must point to the version-specific module.json
      #     attached to THIS GitHub release (not the moving master/ URL), so
      #     Foundry records a stable pointer for each version.
      #   - `compatibility` is pulled live from module.json via jq so the
      #     API version can't drift from the manifest's declared support
      #     window.
      #   - The payload is assembled with `jq -n --arg` / `--argjson` so
      #     dynamic values can't corrupt the JSON structure.
      - name: Publish release to Foundry package browser
        if: steps.foundry.outputs.available == 'true'
        env:
          FOUNDRY_RELEASE_TOKEN: ${{ secrets.FOUNDRY_RELEASE_TOKEN }}
          TAG_VERSION: ${{ steps.version.outputs.version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          compatibility=$(jq -c '.compatibility' module.json)
          manifest_url="https://github.com/${REPOSITORY}/releases/download/release-${TAG_VERSION}/module.json"
          notes_url="https://github.com/${REPOSITORY}/releases/tag/release-${TAG_VERSION}"

          payload=$(jq -n \
            --arg version "$TAG_VERSION" \
            --arg manifest "$manifest_url" \
            --arg notes "$notes_url" \
            --argjson compatibility "$compatibility" \
            '{
              id: "rsreforged",
              release: {
                version: $version,
                manifest: $manifest,
                notes: $notes,
                compatibility: $compatibility
              }
            }')

          echo "Publishing to Foundry package browser:"
          echo "$payload" | jq .

          curl -sS -X POST https://foundryvtt.com/_api/packages/release_version/ \
            -H "Authorization: ${FOUNDRY_RELEASE_TOKEN}" \
            -H "Content-Type: application/json" \
            --fail-with-body \
            -d "$payload"
